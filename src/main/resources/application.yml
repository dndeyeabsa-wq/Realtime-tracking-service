server:
  port: 8085

spring:
  application:
    name: realtime-tracking-service
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

tracking:
  redis:
    ttl-seconds: 300

management:
  endpoints:
    web:
      exposure:
        include: "*"
