server:
  port: 8085

spring:
  application:
    name: realtime-tracking-service

  datasource:
    url: jdbc:postgresql://localhost:5432/brt_tracking_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: tracking-service-group  # ← AJOUTE CETTE LIGNE (OBLIGATOIRE)
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true

services:
  operation: http://localhost:8083
  fleet: http://localhost:8086
  notification: http://localhost:8087

kafka:
  topics:
    bus-arrived: BusArrivedAtStation
    bus-delay: BusDelayDetected
    bus-assigned: BusAssignedToLine
    ticket-validated: TicketValidated